<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Maple Mini RPG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#111;
      color:#eee;
      font-family: Arial, sans-serif;
    }

    canvas {
      display:block;
      width:100%;
      height:100%;
      background:#1b1b1b;
    }

    /* ===== HUD ===== */
    #hud {
      position:fixed;
      top:10px;
      left:10px;
      z-index:100;
      background:rgba(0,0,0,.6);
      padding:12px;
      border-radius:10px;
      max-width:520px;
      max-height:80vh;
      overflow-y:auto;
    }

    #questTitle { font-weight:700; margin-bottom:6px; }
    #questDesc { margin-bottom:8px; }
    #questProgress { margin-bottom:6px; }
    #playerStats { margin-top:8px; }
    #errors { margin-top:8px; color:#ffb3b3; white-space:pre-wrap; font-size:13px; }

    .small {
      font-size:13px;
      opacity:.8;
      margin-top:6px;
    }

    /* ===== TOP-RIGHT MENU ===== */
    #gameMenu {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 300;
      display: none;
    }

    #menuToggle {
      padding: 9px 14px;
      font-size: 15px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: rgba(0,0,0,0.65);
      color: white;
      font-weight: bold;
      letter-spacing: 1px;
    }
    #menuToggle:hover { background: rgba(0,0,0,0.8); }

    #menuDropdown {
      display: none;
      position: absolute;
      top: 42px;
      right: 0;
      min-width: 150px;
      background: rgba(10,10,18,0.92);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    #menuDropdown.open { display: block; }

    .menuItem {
      display: block;
      width: 100%;
      padding: 12px 18px;
      border: none;
      background: none;
      color: white;
      font-size: 14px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s;
    }
    .menuItem:hover { background: rgba(255,255,255,0.1); }
    .menuItem.danger { color: #ff6b6b; }
    .menuItem.save   { color: #f9ca24; }

    .menuDivider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 2px 0;
    }

    /* ===== STATS PANEL (appears below menu) ===== */
    #statsPanel {
      position: fixed;
      top: 56px;
      right: 10px;
      z-index: 290;
      width: 260px;
      padding: 14px;
      background: rgba(10,10,18,0.92);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    #statsButtons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    #statsPanel button {
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      border: none;
      background: #444;
      color: white;
      font-weight: bold;
    }

    /* ===== INVENTORY PANEL ===== */
    #invPanel {
      position: fixed;
      top: 56px;
      right: 10px;
      z-index: 290;
      width: 280px;
      padding: 14px;
      background: rgba(10,10,18,0.92);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      max-height: 70vh;
      overflow-y: auto;
    }

    .inv-potion-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .inv-potion-row:last-child { border-bottom: none; }
    .inv-potion-row img { width: 28px; height: 28px; image-rendering: pixelated; }
    .inv-potion-name { flex: 1; font-size: 13px; }
    .inv-potion-qty { font-size: 13px; opacity: 0.7; min-width: 30px; text-align: right; }
    .inv-use-btn {
      padding: 4px 10px;
      border: none;
      border-radius: 6px;
      background: #2ecc71;
      color: #000;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }
    .inv-use-btn:disabled { opacity: 0.3; cursor: default; }
    .inv-use-btn:hover:not(:disabled) { background: #27ae60; }
    .inv-use-btn.mp { background: #3498db; }
    .inv-use-btn.mp:hover:not(:disabled) { background: #2980b9; }

    /* ===== DEATH OVERLAY ===== */
    #deathOverlay {
      position: fixed;
      inset: 0;
      z-index: 8000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.75);
      color: white;
    }
    #deathOverlay h1 {
      font-size: 48px;
      color: #e74c3c;
      margin-bottom: 12px;
      text-shadow: 0 0 20px rgba(231,76,60,0.6);
    }
    #deathOverlay p {
      font-size: 18px;
      opacity: 0.85;
      margin-bottom: 24px;
    }
    #respawnBtn {
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      background: #e74c3c;
      color: white;
      cursor: pointer;
    }
    #respawnBtn:hover { background: #c0392b; }

    /* ============================= */
    /* ===== LOGIN SCREEN ===== */
    /* ============================= */

    #loginScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1b2a5c, #050814);
      color: white;
    }

    #loginBox {
      width: 360px;
      padding: 22px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.55);
      text-align: center;
    }

    #loginTitle {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    #loginSub {
      opacity: 0.85;
      margin-bottom: 18px;
    }

    .loginInput {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: white;
      outline: none;
    }

    .loginBtn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      margin-top: 6px;
    }

    #loginBtn {
      background: #2ecc71;
      color: #06120a;
      margin-bottom: 10px;
    }

    #registerBtn {
      background: #3498db;
      color: white;
      margin-bottom: 10px;
    }

    #loginMsg {
      margin-top: 12px;
      color: #ffcc66;
      min-height: 18px;
    }

    /* ===== AUTH TABS ===== */
    .authTabs {
      display: flex;
      margin-bottom: 16px;
      gap: 0;
    }
    .authTab {
      flex: 1;
      padding: 10px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.5);
      transition: all 0.2s;
    }
    .authTab:first-child { border-radius: 8px 0 0 8px; }
    .authTab:last-child  { border-radius: 0 8px 8px 0; }
    .authTab.active {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    #emailRow { display: none; }



  </style>
</head>

<body>

  <!-- LOGIN / REGISTER OVERLAY -->
  <div id="loginScreen">
    <div id="loginBox">
      <div id="loginTitle">Maple Login</div>
      <div id="loginSub">Sign in or create an account</div>

      <!-- Tabs -->
      <div class="authTabs">
        <button class="authTab active" id="tabLogin" onclick="switchAuthTab('login')">Login</button>
        <button class="authTab" id="tabRegister" onclick="switchAuthTab('register')">Register</button>
      </div>

      <input id="loginUser" class="loginInput" placeholder="Username" />
      <div id="emailRow">
        <input id="loginEmail" class="loginInput" placeholder="Email" type="email" />
      </div>
      <input id="loginPass" class="loginInput" type="password" placeholder="Password" />

      <button id="loginBtn" class="loginBtn">Login</button>
      <button id="registerBtn" class="loginBtn" style="display:none;">Create Account</button>

      <div id="loginMsg"></div>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="questTitle"></div>
    <div id="questDesc"></div>
    <div id="questProgress"></div>
    <div id="playerStats"></div>
    <div class="small">Move: ← → | Jump: ↑ | Attack: Space</div>
    <div id="errors"></div>
  </div>

  <!-- TOP-RIGHT MENU -->
  <div id="gameMenu">
    <button id="menuToggle">☰ Menu</button>
    <div id="menuDropdown">
      <button class="menuItem" id="statsBtn">📊 Stats</button>
      <button class="menuItem" id="invBtn">🎒 Inventory</button>
      <div class="menuDivider"></div>
      <button class="menuItem save" id="saveBtn">💾 Save Game</button>
      <button class="menuItem danger" id="logoutBtn">🚪 Logout</button>
    </div>
  </div>

  <!-- STATS PANEL -->
  <div id="statsPanel">
    <h3>Player Stats</h3>
    <div id="statsInfo"></div>
    <div id="statsButtons">
      <button id="btnAddSTR">+ STR</button>
      <button id="btnAddVIT">+ VIT</button>
    </div>
  </div>

  <!-- INVENTORY PANEL -->
  <div id="invPanel">
    <h3>Inventory</h3>
    <div id="invInfo">Mesos: 0</div>
    <div id="invPotions"></div>
    <div style="margin-top:8px; font-size:12px; opacity:0.5;">Keys 1-6 to use potions</div>
  </div>

  <!-- DEATH OVERLAY -->
  <div id="deathOverlay">
    <h1>YOU DIED</h1>
    <p>Your quest progress has been reset.</p>
    <button id="respawnBtn">Respawn</button>
  </div>

  <canvas id="c"></canvas>

  <script>
    // ── Auth tab switching (runs before game.js) ──
    function switchAuthTab(tab) {
      const tabLogin    = document.getElementById("tabLogin");
      const tabRegister = document.getElementById("tabRegister");
      const emailRow    = document.getElementById("emailRow");
      const loginBtn    = document.getElementById("loginBtn");
      const registerBtn = document.getElementById("registerBtn");

      if (tab === "register") {
        tabRegister.classList.add("active");
        tabLogin.classList.remove("active");
        emailRow.style.display    = "block";
        loginBtn.style.display    = "none";
        registerBtn.style.display = "block";
      } else {
        tabLogin.classList.add("active");
        tabRegister.classList.remove("active");
        emailRow.style.display    = "none";
        loginBtn.style.display    = "block";
        registerBtn.style.display = "none";
      }
      document.getElementById("loginMsg").textContent = "";
    }
  </script>

  <script src="./game.js"></script>

</body>
</html>
