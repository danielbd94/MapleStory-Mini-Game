<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Maple Mini RPG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#111;
      color:#eee;
      font-family: Arial, sans-serif;
    }

    #hud {
      position:fixed;
      top:10px;
      left:10px;
      z-index:100;
      background:rgba(0,0,0,.45);
      padding:12px;
      border-radius:10px;
      max-width:360px;
      max-height:80vh;
      overflow-y:auto;
    }

    #playerStats { margin-top:4px; font-size: 14px; }
    #errors { margin-top:8px; color:#ffb3b3; white-space:pre-wrap; font-size:13px; }
    #saveStatus { margin-top:8px; color:#ffcc66; white-space:pre-wrap; font-size:13px; }

    canvas {
      display:block;
      width:100%;
      height:100%;
      background:#1b1b1b;
    }

    .small {
      font-size:13px;
      opacity:.8;
      margin-top:6px;
    }

    /* ===== TOP-RIGHT MENU ===== */
    #gameMenu {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 300;
      display: none;
    }

    #menuToggle {
      padding: 9px 14px;
      font-size: 15px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: rgba(0,0,0,0.65);
      color: white;
      font-weight: bold;
      letter-spacing: 1px;
    }
    #menuToggle:hover { background: rgba(0,0,0,0.8); }

    #menuDropdown {
      display: none;
      position: absolute;
      top: 42px;
      right: 0;
      min-width: 150px;
      background: rgba(10,10,18,0.92);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    #menuDropdown.open { display: block; }

    .menuItem {
      display: block;
      width: 100%;
      padding: 12px 18px;
      border: none;
      background: none;
      color: white;
      font-size: 14px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s;
    }
    .menuItem:hover { background: rgba(255,255,255,0.1); }
    .menuItem.danger { color: #ff6b6b; }
    .menuItem.save   { color: #f9ca24; }

    .menuDivider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 2px 0;
    }

    /* ===== STATS PANEL (appears below menu) ===== */
    #statsPanel {
      position: fixed;
      top: 56px;
      right: 10px;
      z-index: 290;
      width: 260px;
      padding: 14px;
      background: rgba(10,10,18,0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    #statsButtons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    #statsPanel button {
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      border: none;
      background: #444;
      color: white;
      font-weight: bold;
    }

    .panelClose {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: white;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .panelClose:hover { background: rgba(255,255,255,0.14); }

    .chatToggleBtn {
      font-size: 11px;
      font-weight: 900;
    }

    .panelHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      user-select: none;
      touch-action: none;
      cursor: move;
    }
    .panelHeader h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.1;
    }

    #statsPanel, #invPanel, #questPanel {
      touch-action: none;
      cursor: move;
    }

    /* ===== CHAT PANEL ===== */
    #chatPanel {
      position: fixed;
      left: 10px;
      bottom: 10px;
      z-index: 350;
      width: 440px;
      height: 200px;
      background: rgba(10,10,18,0.62);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      resize: none;
      min-width: 280px;
      min-height: 120px;
      max-width: 90vw;
      max-height: 70vh;
    }

    #chatPanel.collapsed {
      height: 52px;
      resize: horizontal;
      min-height: 52px;
    }

    #chatHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      cursor: pointer;
      user-select: none;
      background: rgba(0,0,0,0.12);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    #chatTitle {
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.2px;
      font-size: 14px;
    }

    #chatPanel.collapsed #chatMessages,
    #chatPanel.collapsed #chatInputRow {
      display: none;
    }

    #chatResizeHandle {
      position: absolute;
      right: 2px;
      bottom: 2px;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      background: rgba(255,255,255,0.02);
      border-radius: 4px;
      z-index: 3;
      pointer-events: auto;
    }
    #chatPanel.collapsed #chatResizeHandle {
      display: none;
    }

    .chatMessages {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 10px 10px;
      background: rgba(0,0,0,0.08);
      font-size: 12px;
    }

    .chatLine {
      margin-top: 6px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chatName {
      color: #ffffff;
      font-weight: 900;
      margin-right: 6px;
    }

    .chatText {
      color: #eeeeee;
      font-weight: 500;
    }

    .chatInputRow {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.08);
    }

    #chatInput {
      flex: 1;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: white;
      outline: none;
    }

    #chatSendBtn {
      padding: 8px 14px;
      border: none;
      border-radius: 10px;
      background: #2980b9;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    #chatSendBtn:hover { background: #3498db; }

    /* ===== INVENTORY PANEL ===== */
    #invPanel {
      position: fixed;
      top: 56px;
      right: 10px;
      z-index: 290;
      width: 280px;
      padding: 14px;
      background: rgba(10,10,18,0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      max-height: 70vh;
      overflow-y: auto;
    }

    /* ===== QUEST PANEL ===== */
    #questPanel {
      position: fixed;
      top: 56px;
      right: 10px;
      z-index: 285;
      width: 300px;
      padding: 14px;
      background: rgba(10,10,18,0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      max-height: 72vh;
      overflow-y: auto;
    }

    #questPanel #questTitle { font-weight: 700; margin-bottom: 8px; font-size: 14px; line-height: 1.35; }
    #questPanel #questDesc { margin-bottom: 8px; font-size: 13px; opacity: 0.9; line-height: 1.4; }
    #questPanel #questProgress { margin-bottom: 4px; font-size: 12px; line-height: 1.45; opacity: 0.92; white-space: pre-wrap; }

    .inv-potion-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .inv-potion-row:last-child { border-bottom: none; }
    .inv-potion-row img { width: 28px; height: 28px; image-rendering: pixelated; }
    .inv-potion-name { flex: 1; font-size: 13px; }
    .inv-potion-qty { font-size: 13px; opacity: 0.7; min-width: 30px; text-align: right; }
    .inv-use-btn {
      padding: 4px 10px;
      border: none;
      border-radius: 6px;
      background: #2ecc71;
      color: #000;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }
    .inv-use-btn:disabled { opacity: 0.3; cursor: default; }
    .inv-use-btn:hover:not(:disabled) { background: #27ae60; }
    .inv-use-btn.mp { background: #3498db; }
    .inv-use-btn.mp:hover:not(:disabled) { background: #2980b9; }

    /* ===== DEATH OVERLAY ===== */
    #deathOverlay {
      position: fixed;
      inset: 0;
      z-index: 8000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.75);
      color: white;
    }
    #deathOverlay h1 {
      font-size: 48px;
      color: #e74c3c;
      margin-bottom: 12px;
      text-shadow: 0 0 20px rgba(231,76,60,0.6);
    }
    #deathOverlay p {
      font-size: 18px;
      opacity: 0.85;
      margin-bottom: 24px;
    }
    #respawnBtn {
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      background: #e74c3c;
      color: white;
      cursor: pointer;
    }
    #respawnBtn:hover { background: #c0392b; }

    /* ===== LOGIN SCREEN ===== */
    #loginScreen {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    #loginBox {
      width: 360px;
      padding: 22px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.55);
      text-align: center;
    }

    #loginTitle {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    #loginSub {
      opacity: 0.85;
      margin-bottom: 18px;
    }

    .loginInput {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: white;
      outline: none;
    }

    .loginBtn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      margin-top: 6px;
    }

    #loginBtn {
      background: #2ecc71;
      color: #06120a;
      margin-bottom: 10px;
    }

    #registerBtn {
      background: #3498db;
      color: white;
      margin-bottom: 10px;
    }

    #loginMsg {
      margin-top: 12px;
      color: #ffcc66;
      min-height: 18px;
    }

    /* ===== AUTH TABS ===== */
    .authTabs {
      display: flex;
      margin-bottom: 16px;
      gap: 0;
    }
    .authTab {
      flex: 1;
      padding: 10px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.5);
      transition: all 0.2s;
    }
    .authTab:first-child { border-radius: 8px 0 0 8px; }
    .authTab:last-child  { border-radius: 0 8px 8px 0; }
    .authTab.active {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    #emailRow { display: none; }

  </style>
</head>

<body>

  <!-- LOGIN / REGISTER OVERLAY -->
  <div id="loginScreen">
    <div id="loginBox">
      <div id="loginTitle">Maple Login</div>
      <div id="loginSub">Sign in or create an account</div>

      <!-- Tabs -->
      <div class="authTabs">
        <button class="authTab active" id="tabLogin" onclick="switchAuthTab('login')">Login</button>
        <button class="authTab" id="tabRegister" onclick="switchAuthTab('register')">Register</button>
      </div>

      <input id="loginUser" class="loginInput" placeholder="Username" />
      <div id="emailRow">
        <input id="loginEmail" class="loginInput" placeholder="Email" type="email" />
      </div>
      <input id="loginPass" class="loginInput" type="password" placeholder="Password" />

      <button id="loginBtn" class="loginBtn">Login</button>
      <button id="registerBtn" class="loginBtn" style="display:none;">Create Account</button>

      <div id="loginMsg"></div>
    </div>
  </div>

  <!-- HUD (status + errors only; quest is in Quest panel) -->
  <div id="hud">
    <div id="playerStats"></div>
    <div class="small">Arrows move · Up jump · Space attack · <b>Q</b> quest · <b>I</b> inv · <b>S</b> stats · <b>Enter</b> chat</div>
    <div id="errors"></div>
    <div id="saveStatus"></div>
  </div>

  <!-- TOP-RIGHT MENU -->
  <div id="gameMenu">
    <button id="menuToggle"> Menu</button>
    <div id="menuDropdown">
      <button class="menuItem" id="questBtn">Quest</button>
      <button class="menuItem" id="statsBtn">Stats</button>
      <button class="menuItem" id="invBtn">Inventory</button>
      <div class="menuDivider"></div>
      <button class="menuItem save" id="saveBtn">Save Game</button>
      <button class="menuItem danger" id="logoutBtn">Logout</button>
    </div>
  </div>

  <!-- STATS PANEL -->
  <div id="statsPanel">
    <div class="panelHeader">
      <h3>Player Stats</h3>
      <button type="button" id="statsClose" class="panelClose" aria-label="Close stats" title="Close">×</button>
    </div>
    <div id="statsInfo"></div>

    <div id="statsButtons">
      <button id="btnAddSTR">+ STR</button>
      <button id="btnAddVIT">+ VIT</button>
    </div>

    <div style="margin-top:8px; font-size:12px; opacity:.8;">
      Spend your SP here.
    </div>
  </div>

  <!-- QUEST PANEL -->
  <div id="questPanel">
    <div class="panelHeader">
      <h3>Quest</h3>
      <button type="button" id="questClose" class="panelClose" aria-label="Close quest" title="Close">×</button>
    </div>
    <div id="questTitle"></div>
    <div id="questDesc"></div>
    <div id="questProgress"></div>
  </div>

  <!-- INVENTORY PANEL -->
  <div id="invPanel">
    <div class="panelHeader">
      <h3>Inventory</h3>
      <button type="button" id="invClose" class="panelClose" aria-label="Close inventory" title="Close">×</button>
    </div>
    <div id="invInfo">Mesos: 0</div>
    <div id="invPotions"></div>
    <div style="margin-top:8px; font-size:12px; opacity:0.5;">Keys 1-6 to use potions</div>
  </div>

  <!-- CHAT PANEL -->
  <div id="chatPanel" class="chat-panel collapsed">
    <div id="chatHeader">
      <div id="chatTitle">Chat</div>
      <button type="button" id="chatExpandBtn" class="panelClose chatToggleBtn" aria-label="Toggle chat" title="Expand / collapse">▼</button>
    </div>
    <div id="chatMessages" class="chatMessages"></div>
    <div id="chatInputRow" class="chatInputRow">
      <input id="chatInput" type="text" maxlength="200" placeholder="Message… Enter send · empty Enter closes" />
      <button type="button" id="chatSendBtn">Send</button>
    </div>
    <div id="chatResizeHandle" aria-hidden="true"></div>
  </div>

  <!-- DEATH OVERLAY -->
  <div id="deathOverlay">
    <h1>YOU DIED</h1>
    <p>Your quest progress has been reset.</p>
    <button id="respawnBtn">Respawn</button>
  </div>

  <canvas id="c"></canvas>

  <script>
    // Auth tab switching (runs before game.js)
    function switchAuthTab(tab) {
      const tabLogin    = document.getElementById("tabLogin");
      const tabRegister = document.getElementById("tabRegister");
      const emailRow    = document.getElementById("emailRow");
      const loginBtn    = document.getElementById("loginBtn");
      const registerBtn = document.getElementById("registerBtn");

      if (tab === "register") {
        tabRegister.classList.add("active");
        tabLogin.classList.remove("active");
        emailRow.style.display    = "block";
        loginBtn.style.display    = "none";
        registerBtn.style.display = "block";
      } else {
        tabLogin.classList.add("active");
        tabRegister.classList.remove("active");
        emailRow.style.display    = "none";
        loginBtn.style.display    = "block";
        registerBtn.style.display = "none";
      }
      document.getElementById("loginMsg").textContent = "";
    }
  </script>

  <script src="./game.js"></script>

</body>
</html>
